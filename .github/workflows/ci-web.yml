name: CI (web)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # See ci.yml's "Build packages" step comment - one filtered, topological
      # step instead of an explicit per-package list (see issue #31). web only
      # depends on @speedora/shared today, but this keeps the same
      # future-proof pattern as the other 3 workflows rather than one that
      # would go stale again the next time web gains a workspace dependency.
      - name: Build packages
        run: pnpm --filter "./packages/**" build

      - name: Lint
        run: pnpm --filter @speedora/web lint

      - name: Typecheck
        run: pnpm --filter @speedora/web typecheck

      - name: Build
        run: pnpm --filter @speedora/web build
