name: CI (all)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: all
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      # Builds every package under packages/* in dependency-topological order
      # (pnpm --filter respects the workspace dependency graph unless
      # --parallel is passed) - a single filter instead of one explicit step
      # per package so a newly added package is built automatically instead of
      # only once someone remembers to add a step for it here (see issue #31).
      - name: Build packages
        run: pnpm --filter "./packages/**" build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test packages/shared
        run: pnpm --filter @speedora/shared test

      - name: Test packages/storage
        run: pnpm --filter @speedora/storage test

      - name: Test packages/social
        run: pnpm --filter @speedora/social test

      - name: Build
        run: pnpm build
