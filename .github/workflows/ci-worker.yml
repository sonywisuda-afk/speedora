name: CI (worker)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages/shared
        run: pnpm --filter @speedora/shared build

      - name: Build packages/database
        run: pnpm --filter @speedora/database build

      - name: Build packages/storage
        run: pnpm --filter @speedora/storage build

      - name: Build packages/social
        run: pnpm --filter @speedora/social build

      - name: Lint
        run: pnpm --filter @speedora/worker lint

      - name: Typecheck
        run: pnpm --filter @speedora/worker typecheck

      - name: Test
        run: pnpm --filter @speedora/worker test

      - name: Build
        run: pnpm --filter @speedora/worker build
