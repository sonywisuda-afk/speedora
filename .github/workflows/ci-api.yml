name: CI (api)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: api
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # See ci.yml's "Build packages" step comment - one filtered, topological
      # step instead of an explicit per-package list (see issue #31).
      - name: Build packages
        run: pnpm --filter "./packages/**" build

      - name: Lint
        run: pnpm --filter @speedora/api lint

      - name: Typecheck
        run: pnpm --filter @speedora/api typecheck

      - name: Test
        run: pnpm --filter @speedora/api test

      - name: Build
        run: pnpm --filter @speedora/api build
